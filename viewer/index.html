<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="data:,">
<title>Просмотрщик модели компании</title>
<style>
  :root{
    --bg:#fbfbfa; --panel:#fff; --ink:#1c1c1a; --muted:#6b6a64; --line:#e6e4dd;
    --accent:#3266ad; --accent-bg:#e9f1fb;
    --ok:#2f7d32; --ok-bg:#e8f3e9; --warn:#9a6a00; --warn-bg:#fbf0d8;
    --bad:#b3261e; --bad-bg:#fbe9e7; --gray:#5f5e5a; --gray-bg:#efeee9;
    --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  @media (prefers-color-scheme:dark){:root{
    --bg:#161614; --panel:#1f1f1d; --ink:#ececea; --muted:#9b9a93; --line:#33322e;
    --accent:#79a9e6; --accent-bg:#1b2c41;
    --ok:#7fc784; --ok-bg:#16301a; --warn:#e3b75a; --warn-bg:#332714;
    --bad:#e88a82; --bad-bg:#3a1a17; --gray:#a8a79f; --gray-bg:#2a2a27;
  }}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);line-height:1.55;font-size:15px}
  a{color:var(--accent);text-decoration:none;cursor:pointer}
  a:hover{text-decoration:underline}
  code,.mono{font-family:var(--mono);font-size:.86em}
  header{padding:16px 22px;border-bottom:1px solid var(--line);display:flex;gap:16px;align-items:center;flex-wrap:wrap}
  header .title{font-size:18px;font-weight:600}
  header .rev{color:var(--muted);font-size:12.5px;font-family:var(--mono)}
  header .grow{flex:1}
  #search{padding:8px 12px;border:1px solid var(--line);border-radius:8px;background:var(--panel);color:var(--ink);font-size:14px;min-width:220px}
  .banner{background:var(--warn-bg);color:var(--warn);padding:8px 22px;font-size:13px;border-bottom:1px solid var(--line)}
  .layout{display:flex;align-items:flex-start}
  nav{width:208px;flex:none;padding:16px 10px;border-right:1px solid var(--line);position:sticky;top:0}
  nav a{display:block;padding:7px 12px;border-radius:8px;color:var(--ink);font-size:14px}
  nav a:hover{background:var(--gray-bg);text-decoration:none}
  nav a.active{background:var(--accent-bg);color:var(--accent);font-weight:500}
  nav .group{color:var(--muted);font-size:11.5px;text-transform:uppercase;letter-spacing:.04em;padding:14px 12px 4px}
  main{flex:1;padding:22px 26px;min-width:0;max-width:900px}
  h1{font-size:21px;margin:0 0 4px} h2{font-size:16px;margin:24px 0 8px}
  .sub{color:var(--muted);margin:0 0 18px}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin:14px 0}
  .metric{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 16px}
  .metric .n{font-size:26px;font-weight:600} .metric .l{color:var(--muted);font-size:13px}
  .badge{display:inline-block;padding:2px 9px;border-radius:7px;font-size:12px;font-weight:500;font-family:var(--mono)}
  .b-accepted,.b-implemented{background:var(--ok-bg);color:var(--ok)}
  .b-live-proven{background:var(--ok-bg);color:var(--ok)}
  .b-candidate,.b-proposed{background:var(--accent-bg);color:var(--accent)}
  .b-source-connected,.b-scheduled,.b-configured{background:var(--accent-bg);color:var(--accent)}
  .b-hypothesis,.b-medium{background:var(--warn-bg);color:var(--warn)}
  .b-conflict,.b-failed,.b-high{background:var(--bad-bg);color:var(--bad)}
  .b-low{background:var(--gray-bg);color:var(--gray)}
  .b-deprecated,.b-superseded,.b-retired{background:var(--gray-bg);color:var(--gray)}
  .type{background:var(--gray-bg);color:var(--gray)}
  .row{display:flex;gap:10px;align-items:center;padding:11px 14px;border:1px solid var(--line);border-radius:10px;margin-bottom:8px;background:var(--panel)}
  .row .grow{flex:1;min-width:0}
  .row .name{font-weight:500} .row .id{color:var(--muted);font-family:var(--mono);font-size:12.5px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:20px 22px}
  .meta{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0 4px}
  .meta .pill{font-size:12.5px;color:var(--muted);background:var(--gray-bg);padding:3px 10px;border-radius:7px}
  .sec h3{font-size:14px;margin:18px 0 4px;color:var(--ink)}
  .sec p{margin:4px 0} .sec ul{margin:4px 0 4px 18px;padding:0}
  .links{margin-top:6px}
  .links .rel{font-family:var(--mono);font-size:12.5px;color:var(--muted)}
  .lk{display:inline-block;margin:3px 6px 3px 0;padding:3px 9px;border:1px solid var(--line);border-radius:7px;font-family:var(--mono);font-size:12.5px}
  .btn{border:1px solid var(--line);background:var(--panel);color:var(--ink);border-radius:8px;padding:5px 11px;font-size:12.5px;cursor:pointer}
  .btn:hover{background:var(--gray-bg)}
  details{margin-top:14px} summary{cursor:pointer;color:var(--muted);font-size:13px}
  pre{background:var(--gray-bg);border-radius:10px;padding:12px 14px;overflow:auto;font-family:var(--mono);font-size:12.5px}
  table{border-collapse:collapse;width:100%;font-size:13.5px} td,th{text-align:left;padding:7px 10px;border-bottom:1px solid var(--line)}
  th{color:var(--muted);font-weight:500}
  caption{text-align:left;color:var(--muted);font-size:12.5px;margin:0 0 6px}
  .table-scroll{overflow-x:auto;max-width:100%}
  .table-scroll td,.table-scroll th{vertical-align:top;overflow-wrap:anywhere}
  .flow{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin:6px 0}
  .node{padding:6px 12px;border-radius:8px;font-size:13px}
  .arrow{color:var(--muted)}
  .empty{color:var(--muted);padding:14px 0}
  .mmwrap{margin:8px 0 4px}
  .mmcap{color:var(--muted);font-size:12.5px;margin-bottom:6px}
  .mmd{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px;overflow:auto;min-height:40px}
  .mmd.wb{background-image:radial-gradient(var(--line) 1px, transparent 1px);background-size:20px 20px}
  .mmd svg{max-width:100%;height:auto;display:block;margin:0 auto}
  .mmsrc{margin-top:6px}.mmsrc summary{font-size:12.5px}.mmsrc pre{margin:6px 0 0}
  .funnel{margin:10px 0}
  .fmeta{font-size:12px;color:var(--muted);margin:0 0 8px}
  .flive{display:inline-block;background:var(--ok-bg);color:var(--ok);border-radius:5px;padding:1px 7px;font-weight:500;margin-right:3px}
  .frow{display:flex;align-items:stretch;flex-wrap:wrap;gap:0}
  .fstage{flex:1 1 120px;min-width:120px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 14px}
  .fname{font-size:12.5px;color:var(--muted);line-height:1.3}
  .fcount{font-size:24px;font-weight:500;margin:4px 0 9px}
  .ftrack{height:8px;background:var(--gray-bg);border-radius:6px;overflow:hidden}
  .fbar{height:8px;background:var(--ok);border-radius:6px}
  .fconv{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 8px;min-width:58px}
  .fpct{font-size:14px;font-weight:500;color:var(--ink)}
  .fdrop{font-size:11px;color:var(--bad)}
  .fsla{font-size:11px;color:var(--muted)}
  .fx{width:0;height:0;border-top:5px solid transparent;border-bottom:5px solid transparent;border-left:8px solid var(--muted);margin-top:5px}
  .flost{display:flex;align-items:center;gap:12px;margin-top:12px;background:var(--bad-bg);border-radius:12px;padding:11px 15px}
  .flabel{color:var(--bad);font-weight:500;flex:1}
  .flostn{font-size:20px;font-weight:500;color:var(--bad)}
  @media (max-width:680px){
    .layout{display:block}
    nav{display:flex;width:100%;overflow-x:auto;position:static;border-right:0;border-bottom:1px solid var(--line);padding:8px}
    nav a{flex:none;white-space:nowrap}
    nav .group{display:none}
    main{padding:16px}
  }
</style>
</head>

let DATA = FALLBACK;
let OFFICIAL_LOAD_ERROR = null;
const TYPE_RU = {business:"Бизнесы","production-system":"Производственные системы",role:"Роли",artifact:"Артефакты",tool:"Инструменты",metric:"Метрики",state:"Состояния",process:"Процессы",interface:"Интерфейсы",decision:"Решения",term:"Термины"};
const esc = s => String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const byId = id => (DATA.allCards||DATA.cards).find(c=>c.id===id);
const viewerOf = c => (c&&c.viewer)||{};
const asList = v => Array.isArray(v)?v:(v==null||v===""?[]:[v]);
const cardTitle = id => {const c=byId(id);return c?c.title:id;};

let DPEND={};let DGID=0;
const ACCENT={business:"#2f7d32","production-system":"#6b54c6",role:"#6b6a64",artifact:"#3266ad",tool:"#6b6a64",metric:"#3266ad",state:"#1d9e75",process:"#5f6b76",interface:"#9a6a00",decision:"#b5892a",term:"#5f6b76",action:"#7c7b74",danger:"#b3261e",start:"#2f7d32",ghost:"#8a8a84"};
// Cards whose status is not yet accepted show that on every schema they appear
// on — a diagram should not look more settled than the model actually is.
const STATUS_USED=new Set();
function statusDeco(status){
  if(status==null||status==="accepted"||status==="implemented")return null;
  STATUS_USED.add(status);
  if(status==="candidate"||status==="proposed")return {dash:"4 3",stroke:null,halo:null,label:"черновик"};
  if(status==="hypothesis")return {dash:null,stroke:"var(--warn)",halo:"var(--warn-bg)",label:"догадка"};

  return {dash:null,stroke:null,halo:null,label:status};
}
function statusLegendHTML(hasGhost){
  if(!STATUS_USED.size&&!hasGhost)return "";
  const rows=[...STATUS_USED].sort().map(s=>{
    const d=statusDeco(s)||{};
    const sw=d.halo?"var(--warn)":(d.stroke||"var(--muted)");
    const dash=d.dash?` stroke-dasharray="${d.dash}"`:"";
    return `<span style="display:inline-flex;align-items:center;gap:5px;margin-right:14px">`
      +`<svg width="16" height="16" viewBox="0 0 16 16"><rect x="1.5" y="1.5" width="13" height="13" rx="3" fill="none" stroke="${esc(sw)}" stroke-width="1.5"${dash}/></svg>`
      +`<span style="font-size:12px;color:var(--muted)">${esc(d.label||s)}</span></span>`;
  }).join("");
  const ghostRow=hasGhost?`<span style="display:inline-flex;align-items:center;gap:5px;margin-right:14px"><svg width="16" height="16" viewBox="0 0 16 16"><rect x="1.5" y="1.5" width="13" height="13" rx="3" fill="none" stroke="#8a8a84" stroke-width="1.5" stroke-dasharray="4 3"/></svg><span style="font-size:12px;color:var(--muted)">нет карточки</span></span>`:"";
  return `<div style="margin-top:6px;display:flex;flex-wrap:wrap;align-items:center">${rows}${ghostRow}</div>`;
}
function dgWrap(text,max){const words=String(text==null?"":text).split(/\s+/);const lines=[];let cur="";words.forEach(w=>{if((cur+" "+w).trim().length>max&&cur){lines.push(cur);cur=w;}else cur=(cur+" "+w).trim();});if(cur)lines.push(cur);return lines.length?lines:[""];}
function dgSize(n){const max=n.shape==="diamond"?16:24;const lines=dgWrap(n.label,max);n._lines=lines;const longest=lines.reduce((m,l)=>Math.max(m,l.length),0);let w=Math.max(96,Math.min(230,longest*7.4+30));let h=(lines.length+(n.sub?1:0))*16+20;if(n.shape==="diamond"){w=Math.max(w+30,140);h=Math.max(h+34,92);}return {w,h};}
function ghostNode(id){const n={id,label:id,shape:"rect",accent:"ghost",ghost:true};const s=dgSize(n);return Object.assign(n,{width:s.w,height:s.h});}

function viewerStageRows(ps){
  const viewer=viewerOf(ps);
  if(Array.isArray(viewer.stages)&&viewer.stages.length)return viewer.stages;
  const stages=(ps.attrs&&ps.attrs.stages)||[];
  return stages.map((raw,i)=>{
    if(raw&&typeof raw==="object"){
      const state=raw.state||raw.id||"";
      return {id:raw.id||`${ps.id}-stage-${i+1}`,state,label:raw.label||cardTitle(state)||state,processes:asList(raw.processes),roles:asList(raw.roles)};
    }
    const state=String(raw);
    return {id:state,state,label:cardTitle(state),processes:[],roles:[]};
  }).filter(r=>r.id);
}
function viewerProcessSteps(card){
  const viewer=viewerOf(card);
  if(Array.isArray(viewer.processSteps)&&viewer.processSteps.length)return viewer.processSteps;
  const steps=(card.attrs&&card.attrs.steps)||[];
  return steps.map((raw,i)=>{
    if(!raw||typeof raw!=="object"){
      const id=String(raw||`step-${i+1}`);
      return {id,label:id,shape:i===0?"start":"rect"};
    }
    const decision=(raw.decision&&typeof raw.decision==="object")?raw.decision:{};
    const yes=raw.yes||decision.yes||"";
    const no=raw.no||decision.no||"";
    const next=raw.next||"";
    const shape=raw.shape||((raw.type==="decision"||raw.decision||yes||no)?"diamond":(i===0?"start":"rect"));
    const activity=raw.does||"";
    const label=decision.question||raw.text||raw.label||activity||raw.id||`step-${i+1}`;
    return {id:raw.id||`step-${i+1}`,label,activity:activity&&activity!==label?activity:"",shape,warn:raw.warn,yes,no,next};
  });
}

function systemSpec(biz){const viewer=viewerOf(biz);const psIds=(viewer.productionSystems&&viewer.productionSystems.length?viewer.productionSystems:((biz.links&&biz.links.owns)||[]));const containers=[],nodes=[],edges=[];const addCardNode=(id,shape,accent)=>{if(!id||nodes.some(n=>n.id===id))return;const c=byId(id);nodes.push({id,label:(c&&c.title)||id,shape:shape||"rect",accent:accent||(c&&c.type)||"artifact",status:c&&c.status});};psIds.forEach(pid=>{const ps=byId(pid);if(!ps||ps.type!=="production-system")return;containers.push({id:"c_"+pid,label:ps.title,accent:"production-system"});const stages=viewerStageRows(ps);let prev=null;stages.forEach(stage=>{const nodeId=stage.id||stage.state;const st=byId(stage.state);nodes.push({id:nodeId,label:stage.label||((st||{}).title)||nodeId,sub:stage.state&&stage.state!==nodeId?stage.state:"",shape:"rect",accent:"state",parent:"c_"+pid,status:st&&st.status});if(prev)edges.push({from:prev,to:nodeId});prev=nodeId;});const first=stages[0]&&(stages[0].id||stages[0].state);const last=prev;(viewer.inputArtifacts||((biz.links&&biz.links.consumes)||[])).forEach(aid=>{addCardNode(aid,"rect","artifact");if(first)edges.push({from:aid,to:first,label:"вход"});});(viewer.inboundInterfaces||[]).forEach(iid=>{const iface=byId(iid);participantsOf(iface,"supplier").forEach(sid=>{addCardNode(sid,"rect","business");participantsOf(iface,"subject").forEach(subj=>{addCardNode(subj,"rect","artifact");edges.push({from:sid,to:subj,label:(iface&&iface.title)||"передача"});if(first)edges.push({from:subj,to:first});});});});(viewer.outputArtifacts||((biz.links&&biz.links.produces)||[])).forEach(aid=>{addCardNode(aid,"rect","artifact");if(last)edges.push({from:last,to:aid,label:"выход"});(viewer.outboundInterfaces||[]).forEach(iid=>{const iface=byId(iid);if(!participantsOf(iface,"subject").includes(aid))return;participantsOf(iface,"customer").forEach(cid=>{addCardNode(cid,"rect","business");edges.push({from:aid,to:cid,label:(iface&&iface.title)||"передача" function processWbSpec(card){const steps=viewerProcessSteps(card);const nodes=steps.map((st,i)=>({id:st.id,label:st.label,sub:st.activity,shape:st.shape==="diamond"?"diamond":(st.shape==="start"||i===0?"start":"rect"),accent:st.warn?"danger":(st.shape==="diamond"?"decision":(i===0?"start":"action"))}));const edges=[];steps.forEach(st=>{if(st.shape==="diamond"){if(st.yes)edges.push({from:st.id,to:st.yes,label:"Да"});if(st.no)edges.push({from:st.id,to:st.no,label:"Нет"});}else if(st.next)edges.push({from:st.id,to:st.next});});if(card.attrs&&card.attrs.regulation&&steps[0]){nodes.push({id:"reg",label:"Регламент: "+card.attrs.regulation,shape:"sticky",color:"#cfe4ff"});edges.push({from:"reg",to:steps[0].id});}return {dir:"TB",nodes,edges};}

function funnelHTML(card){
  // Structure comes from the MODEL (stages, SLA rules, binding). Volumes are
  // super-dynamic and are NOT model — they are a live reading from the source,
  // shown as a labelled overlay and never committed to the ontology.
  const stages=(card.attrs&&card.attrs.funnelStages)||[];if(!stages.length)return "";
  const tr=(card.attrs&&card.attrs.transitions)||[];const slaOf={};tr.forEach(t=>{if(t.sla)slaOf[t.to]=t.sla;});
  const bind=card.attrs&&card.attrs.binding;
  const live=(DATA.live&&DATA.live[card.id])||null;const counts=(live&&live.counts)||{};
  const num=n=>Number(n||0).toLocaleString("ru-RU");
  const max=Math.max.apply(null,stages.map(s=>counts[s]||0))||1;
  const meta=live
    ? `<div class="fmeta"><span class="flive">live</span> из ${esc(live.source||"источника")} · снимок ${esc(live.asOf||"")} — это чтение, не часть модели</div>`
    : `<div class="fmeta">Каркас — из модели. Объёмы придут из источника${bind?` (${esc(bind.source)})`:""} — пока не подключено, показаны «—».</div>`;
  let cells="";
  stages.forEach((s,i)=>{
    const cv=counts[s];
    if(i>0){const prev=counts[stages[i-1]];const conv=(prev!=null&&cv!=null&&prev)?Math.round(100*cv/prev):null;const drop=(prev!=null&&cv!=null)?prev-cv:null;
      cells+=`<div class="fconv"><span class="fpct"${conv==null?' style="color:var(--muted)"':''}>${conv!=null?conv+"%":"—"}</span>${drop>0?`<span class="fdrop">−${num(drop)}</span>`:""}${slaOf[s]?`<span class="fsla">${esc(slaOf[s])}</span>`:""}<span class="fx"></span></div>`;}
    cells+=`<div class="fstage"><div class="fname">${esc(s)}</div><div class="fcount">${cv!=null?num(cv):"—"}</div><div class="ftrack"><div class="fbar" style="width:${cv!=null?Math.round(100*cv/max):0}%"></div></div></div>`;
  });
  const lost=card.attrs&&card.attrs.lost;let lostHtml="";
  if(lost){const lc=live&&live.lost;lostHtml=`<div class="flost"><span class="flabel">${esc(lost.label||"Проиграно")}</span><span class="flostn">${lc!=null?num(lc):"—"}</span>${lost.card?`<a class="btn" href="#card/${esc(lost.card)}">почему →</a>`:""}</div>`;}
  return `<div class="funnel">${meta}<div class="frow">${cells}</div>${lostHtml}</div>`;
}

function processStepReviewTable(card){

  function attrBlock(label,v){
    if(Array.isArray(v)){if(!v.length)return"";
      if(typeof v[0]==="object")return H(label)+renderTable(v);
      if(v.every(isId))return H(label)+chips(v);
      return H(label)+bullets(v);}
    if(v&&typeof v==="object")return H(label)+renderTable([v]);
    return "";}
  if(c.type==="state"&&A.funnelStages){html+=H("Воронка")+`<p class="sub" style="margin:2px 0 6px">Каркас воронки — из модели; объёмы — живое чтение из источника, не часть модели.</p>`+funnelHTML(c);if(A.transitions)html+=H("Схема воронки (доска)")+wbBlock(lifecycleWbSpec(c),"Состояния, переходы с временами, стикеры-заметки")+H("Матрица переходов")+transitionMatrixTable(c);}
  else if(c.type==="state"&&A.transitions){html+=H("Схема состояний (доска)")+wbBlock(lifecycleWbSpec(c),"Состояния и переходы; на стрелках — событие и SLA")+H("Матрица переходов")+transitionMatrixTable(c);}
  if(c.type==="state"&&A["reason-codes"]){html+=H("Коды причин")+reasonCodesTable(c);}
  if(c.type==="process"&&A.steps){html+=H("Деятельность (процесс)")+wbBlock(processWbSpec(c),"Шаги и ветвления; ромбы — решения (Да/Нет)")+H("Шаги процесса")+processStepReviewTable(c);}
  if(c.type==="decision"){html+=H("Decision contract")+decisionContractTable(c);}
  if(c.type==="business"){html+=H("Схема потоков")+`<p class="sub" style="margin:2px 0 6px">Источники → производственные системы (со стадиями) → заказчик.</p>`+wbBlock(systemSpec(c),"");}
  if(c.type==="production-system"&&viewerStageRows(c).length){html+=H("Этапы")+`<p class="sub" style="margin:2px 0 6px">Производственная система состоит из этапов; на каждом — свои процессы.</p>`+stageTable(viewerStageRows(c));}
  if(c.type==="state"&&Array.isArray(A.processes)&&A.processes.length){
    html+=H("Процессы на этом этапе");
    A.processes.forEach(pid=>{const p=byId(pid);if(p&&p.attrs&&p.attrs.steps)html+=`<p class="sub" style="margin:8px 0 2px"><a href="#card/${esc(pid)}">${esc(p.title)}</a></p>`+wbBlock(processWbSpec(p),"");else if(p)html+=chips([pid]);});
  }
  const HANDLED=new Set(["transitions","steps","states","stages","processes","funnelStages","binding","lost","notes","regulation","subtype","module","business","entity","irreversible","formula","unit","owner","sourceOfTruth","quality-criterion","outcome","reason-codes","episode","scope","decision-owner","transition-authority","measurement-convention","affected-workflows","affected-kpis","propagation-sla","override-policy","exception-path","blast-radius","direction","target","baseline","refresh-cadence","influences"]);
  if(c.type==="interface")HANDLED.add("participants");
  [["inputs","Входы"],["outputs","Выходы"],["participants","Участники"],["activities","Деятельность"],["attributes","Атрибуты"],["obligatoryFields","Обязательные поля"],["criteria","Критерии (чек-лист)"],["lossReasons","Причины проигрыша"]].forEach(([k,label])=>{
    if(A[k]==null||HANDLED.has(k))return;HANDLED.add(k);
    if(k==="criteria"){html+=H(label)+criteriaList(A[k]);return;}
    if(k==="lossReasons")html+=`<p class="sub" style="margin:14px 0 0">Причина проигрыша — атрибут этого состояния (перечень, столбцы заданы данными):</p>`;
    html+=attrBlock(label,A[k]);
  });
  Object.keys(A).forEach(k=>{if(HANDLED.has(k))return;HANDLED.add(k);const v=A[k];if((Array.isArray(v)&&v.length)||(v&&typeof v==="object"&&!Array.isArray(v)))html+=attrBlock(attrLabel(k),v);});
  if(isMetric(c)){html+=H("Measurement contract")+metricContractBlock(c);}
  const nb=neighborSpec(id);
  if(nb&&["business","production-system","interface","artifact","tool","role","state","process","decision","term"].includes(c.type)&&!isMetric(c)){const cap=c.type==="production-system"?"Связи системы (по графу)":(c.type==="interface"?"Передача: поставщик, предмет, заказчик":"Связи карточки");html+=H("Схема связей")+dgmBlock(nb,cap);}
  html+=`<div style="margin-top:16px"><button class="btn" onclick="copyLink('${esc(c.id)}')">скопировать ссылку</button></div>`;
  // technical view
  const tech={id:c.id,type:c.type,status:c.status,source:c.source,owner:c.owner,"last-reviewed":c.lastReviewed,"next-audit":c.nextAudit,volatility:c.volatility,evidence:c.evidence,aliases:c.aliases,attrs:c.attrs,links:c.links,file:c.file};
  html+=`<details><summary>Технический вид (как в артефакте)</summary><pre>${esc(JSON.stringify(tech,null,2))}</pre></details>`;
  html+=`</div>`;
  return html;
}

function processView(){
  const ifs=DATA.cards.filter(c=>c.type==="interface");
  const states=DATA.cards.filter(c=>c.type==="state");
  const procs=DATA.cards.filter(c=>c.type==="process");
  let html=`<h1>Процессы и передачи</h1><p class="sub">Интерфейсы как контракты «поставщик → предмет → заказчик», состояния и процессы.</p>`;
  html+=`<h2>Передачи (интерфейсы)</h2>`;
  html+= ifs.length?ifs.map(c=>{
    const p=(c.attrs&&c.attrs.participants)||{};const one=x=>Array.isArray(x)?x.join(", "):(x||"—");
    return `<div class="card" style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:6px"><b>${esc(c.title)}</b><a class="id mono" href="#card/${esc(c.id)}">${esc(c.id)}</a></div>
      <div class="flow"><span class="node b-candidate">${esc(one(p.supplier))}</span><span class="arrow">→</span><span class="node type mono">${esc(one(p.subject))}</span><span class="arrow">→</span><span class="node b-candidate">${esc(one(p.customer))}</span></div>
      ${c.attrs&&c.attrs["quality-criterion"]?`<p class="sub" style="margin:2px 0">приёмка: ${esc(c.attrs["quality-criterion"])}</p>`:""}</div>`;
  }).join(""):`<p class="empty">Интерфейсов пока нет.</p>`;
  html+=`<h2>Состояния</h2>`;
  html+= states.length?states.map(c=>{
    const sot=(c.links&&c.links["source-of-truth"])||[];
    return `<div class="row"><div class="grow"><span class="name">${esc(c.title)}</span> <span class="id">${esc(c.id)}</span>${sot.length?` · истина в: <span class="mono">${esc(sot.join(", "))}</span>`:""}</div><a class="btn" href="#card/${esc(c.id)}">открыть</a></div>`;
  }).join(""):`<p class="empty">Состояний пока нет.</p>`;
  if(procs.length){html+=`<h2>Процессы</h2>`+procs.map(rowHtml).join("")}
  return html;
}

function sourcesView(){
  const trust=sourceTrustData();
  const ss=trust.sources||[];
  let html=`<h1>Источники</h1><p class="sub">Откуда модель знает то, что знает, насколько источнику можно верить, какие карточки от него зависят, и есть ли readiness/proof.</p>`;
  const unresolved=asList(trust.unresolvedSourceCardIds);
  const unknown=asList(trust.unknownSourceCardIds);
  if(unresolved.length)html+=`<p class="sub" style="color:var(--warn);margin:6px 0">Неразрешённый source у карточек: ${cardLinks(unresolved,12)}</p>`;
  if(unknown.length)html+=`<p class="sub" style="color:var(--warn);margin:6px 0">source = unknown: ${cardLinks(unknown,12)}</p>`;
  if(!ss.length)return html+`<p class="empty">Источники не заданы.</p>`;
  html+=`<div class="table-scroll"><table><tr><th>id</th><th>доверие</th><th>готовность</th><th>зависимых карточек</th><th>владелец</th><th>доступ</th><th>proof</th><th>смысл</th></tr>`;
  for(const s of ss){
    const synthetic=String(s.accessMode||"").includes("synthetic-fixture")?` <span class="pill">synthetic-fixture</span>`:"";
    html+=`<tr><td class="mono">${esc(s.id)}</td><td>${badge(s.trust||"unknown")}</td><td>${badge(s.readinessStatus||"unknown")}</td><td>${esc(s.dependentCardCount||0)}<div class="links">${cardLinks(s.dependentCardIds,8)}</div></td><td>${esc(s.owner)}</td><td>${esc(s.accessMode)}${synthetic}</td><td class="mono">${esc(s.lastProofId||"—")}</td><td>${esc(s.meaning)}</td></tr>`;
  }
  return html+`</table></div>`;
}

  const items=reviewData();

  if(!items.length)return html+`<p class="empty">Элементы ревью (reviewItems) не найдены. Нельзя делать отдельный вывод "нет открытых вопросов" без пустого reviewItems.</p>`;
  if(humanRequests.length)html+=humanRequestsTable(humanRequests);
  const groups=[

function workingView(){
  const working=DATA.workingModel||{};
  const cards=Array.isArray(DATA.workingCards)?DATA.workingCards:[];
  const packages=Array.isArray(working.packages)?working.packages:[];
  let html=`<h1>Рабочий слой</h1><div class="card" style="border-color:var(--warn)"><b>Это не принятая бизнес-истина.</b><p class="sub" style="margin:6px 0 0">Здесь видны только безопасные проекции пакетов изменений. Принятие или отклонение происходит через human review; сырьё, транскрипты и фрагменты доказательств сюда не публикуются.</p></div>`;
  html+=`<div class="grid">`+
    `<div class="metric"><div class="n">${working.packageCount||0}</div><div class="l">пакетов</div></div>`+
    `<div class="metric"><div class="n">${working.changeCount||0}</div><div class="l">изменений</div></div>`+
    `<div class="metric"><div class="n">${working.cardCount||0}</div><div class="l">структурированных карточек</div></div></div>`;
  if(packages.length){
    html+=`<h2>Пакеты</h2><div class="table-scroll"><table><tr><th>package</th><th>статус</th><th>риск</th><th>изменений</th><th>карточек</th><th>смысл</th></tr>`;
    packages.forEach(p=>{html+=`<tr><td class="mono">${esc(p.packageId)}</td><td>${badge(p.status||"pending")}</td><td>${badge(p.risk||"unknown")}</td><td>${esc(p.changeCount||0)}</td><td>${esc(p.cardCount||0)}</td><td>${esc(p.summary||"")}</td></tr>`;});
    html+=`</table></div>`;
  }
  html+=`<h2>Структурированные карточки</h2>`;
  html+=cards.length?cards.map(rowHtml).join(""):`<p class="empty">В пакетах пока нет безопасной candidateCard-проекции. Сами изменения находятся в <a href="#questions">очереди ревью</a>; viewer не придумывает карточки из фрагментов сырья.</p>`;
  return html;
}

function searchView(query){
  const q=query.toLowerCase();
  const fallbackText=c=>[
    c.id,c.title,c.type,c.status,c.owner,c.source,c.volatility,
    asList(c.evidence).join(" "),asList(c.aliases).join(" "),
    JSON.stringify(c.attrs||{}),JSON.stringify(c.links||{}),
    ...(c.sections||[]).map(s=>(s.heading||"")+" "+(s.body||"")),
  ].join(" ");
  const f=c=>String(c.searchText||fallbackText(c)).toLowerCase().includes(q);
  return cardList(f,"Поиск: "+query,"Поиск смотрит в safe поля карточки: id, title, body sections, attrs, links, owner/source, aliases, evidence, SLA/rule, authority и metric binding.");
}

function mapView(){
  let html=`<h1>Карта модели</h1><p class="sub">Все карточки модуля и типизированные связи между ними. Узлы — карточки, подписи на рёбрах — отношения.</p>`;
  html+=dgmBlock(modelSpec(),"Граф модели "+esc(DATA.module));
  return html;
}

function route(){
  const h=(location.hash||"#overview").slice(1);
  let html,active=h;
  if(h.startsWith("card/"))html=cardView(decodeURIComponent(h.slice(5)));
  else if(h.startsWith("type/")){const t=decodeURIComponent(h.slice(5));html=cardList(c=>c.type===t,TYPE_RU[t]||t)}
  else if(h.startsWith("status/")){const s=decodeURIComponent(h.slice(7));html=cardList(c=>c.status===s,"Статус: "+s)}
  else if(h.startsWith("search/"))html=searchView(decodeURIComponent(h.slice(7)));
  else if(h==="cards")html=cardList(()=>true,"Все карточки");
  else if(h==="working")html=workingView();
  else if(h==="map")html=mapView();
  else if(h==="metrics")html=metricsView();
  else if(h==="process")html=processView();
  else if(h==="sources")html=sourcesView();
  else if(h==="questions")html=questionsView();
  else {html=overview();active="overview"}
  document.getElementById("view").innerHTML=html;
  setActive(active);
  renderDagreAll();
  window.scrollTo(0,0);
}

function copyLink(id){
  const url=location.origin+location.pathname+"#card/"+id;
  navigator.clipboard&&navigator.clipboard.writeText(url);
  const b=event.target;const t=b.textContent;b.textContent="скопировано ✓";setTimeout(()=>b.textContent=t,1200);
}

function boot(){
  const accepted=Array.isArray(DATA.cards)?DATA.cards:[];
  const working=Array.isArray(DATA.workingCards)?DATA.workingCards:[];
  DATA.acceptedCards=accepted.slice();
  DATA.allCards=accepted.concat(working);
  const acceptedEdges=Array.isArray(DATA.edges)?DATA.edges:[];
  const workingEdges=Array.isArray(DATA.workingEdges)?DATA.workingEdges:[];
  DATA.edges=acceptedEdges;
  if(!Array.isArray(DATA.edges)||!DATA.edges.length){DATA.edges=[];DATA.cards.forEach(c=>Object.entries(c.links||{}).forEach(([rel,ts])=>(ts||[]).forEach(t=>DATA.edges.push({from:c.id,to:t,type:rel}))));}
  DATA.allEdges=DATA.edges.concat(workingEdges);
  if(!DATA.health){const bs={};DATA.cards.forEach(c=>bs[c.status]=(bs[c.status]||0)+1);const known=c=>c.owner&&!["","unknown","not applicable","n/a"].includes(String(c.owner).toLowerCase());
    DATA.health={total:DATA.cards.length,byStatus:bs,ownerCoveragePct:Math.round(100*DATA.cards.filter(known).length/(DATA.cards.length||1)),sourceResolvedPct:null,stalePastNextAudit:null,conflicts:bs.conflict||0,hypotheses:bs.hypothesis||0};}
  if(!DATA.sourceReadiness)DATA.sourceReadiness={configuredCount:0,sourceConnectedCount:0,liveProvenCount:0,scheduledCount:0,failedCount:0,sourceInstanceIdsByStatus:{configured:[],"source-connected":[],"live-proven":[],scheduled:[],failed:[]},lastProofIdsBySource:{}};
  if(!DATA.sourceTrust)DATA.sourceTrust={sources:DATA.sources||[],unresolvedSourceCardIds:[],unknownSourceCardIds:[],cardsBySource:{}};
  if(!Array.isArray(DATA.openHumanRequests))DATA.openHumanRequests=[];
  if(DATA.openHumanRequestCount==null)DATA.openHumanRequestCount=0;
  if(!DATA.validationStatus)DATA.validationStatus="unknown";
  document.getElementById("modtitle").textContent="Модель: "+(DATA.module||"компания");
  const modelRev=DATA.modelRevision||DATA.revision;
  const packageLabel=DATA.packageVersion?(" · пакет "+DATA.packageVersion):"";
  const workingChanges=(DATA.workingModel&&DATA.workingModel.changeCount)||0;
  const workingLabel=workingChanges?(` · изменений на проверке ${workingChanges}`):"";
  document.getElementById("rev").textContent=(modelRev?("модель "+modelRev):"")+packageLabel+workingLabel+(DATA.generatedAt&&DATA.generatedAt!=="demo"?" · "+DATA.generatedAt:"");
  nav();route();
}

document.getElementById("search").addEventListener("input",e=>{
  const v=e.target.value.trim();location.hash=v?("search/"+encodeURIComponent(v)):"cards";
});
window.addEventListener("hashchange",()=>OFFICIAL_LOAD_ERROR?showOfficialLoadError(OFFICIAL_LOAD_ERROR):route());

function fetchText(url){return fetch(url,{cache:"no-store"}).then(r=>{if(!r.ok)throw new Error(url+" "+r.status);return r.text()});}
function tryFetch(url){return fetchText(url).then(t=>JSON.parse(t));}
async function sha256Text(text){const bytes=new TextEncoder().encode(text);const buf=await crypto.subtle.digest("SHA-256",bytes);return "sha256:"+Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");}
async function loadOfficialBundle(){
  const report=await tryFetch("./VIEWER_PUBLISH_REPORT.json");
  if(report.status!=="published")throw new Error("viewer report is not published");
  const bundleName=report.bundle||"ontology.json";
  if(!/^ontology(?:\.[0-9a-f]{16})?\.json$/.test(bundleName))throw new Error("viewer report contains an invalid bundle name");
  const text=await fetchText("./"+bundleName);
  if(report.bundle_hash&&window.crypto&&crypto.subtle){
    const actual=await sha256Text(text);
    if(actual!==report.bundle_hash)throw new Error("viewer bundle hash mismatch");
  }
  const data=JSON.parse(text);
  if(report.package_version&&data.packageVersion!==report.package_version)throw new Error("viewer package version mismatch");
  if(report.package_commit&&data.packageCommit!==report.package_commit)throw new Error("viewer package commit mismatch");
  if(report.model_revision&&data.modelRevision!==report.model_revision)throw new Error("viewer model revision mismatch");
  if(data.validationStatus!=="passed")throw new Error("viewer model validation is not passed");
  return data;
}
function isExplicitDemoMode(){
  const params=new URLSearchParams(location.search);
  const hash=(location.hash||"").replace(/^#/,"");
  return params.get("demo")==="1"||hash==="demo";
}

  try{
    const d=await tryFetch("./sample-clubfirst.json");
    document.getElementById("banner").innerHTML='Показан демонстрационный набор «Clubfirst» на выдуманных данных. Это не текущая модель компании. Для официального просмотра откройте URL без <code>?demo=1</code> и с опубликованными файлами <code>VIEWER_PUBLISH_REPORT.json</code> + версионированным bundle.';
    return d;
  }catch(e){
    document.getElementById("banner").innerHTML='Показан встроенный пример. Это demo-режим, не текущая модель компании.';
    return FALLBACK;
  }
}
function showOfficialLoadError(error){
  OFFICIAL_LOAD_ERROR=error;
  const reason=error&&error.message?error.message:String(error||"unknown error");
  document.getElementById("modtitle").textContent="Модель компании";
  document.getElementById("rev").textContent="официальная загрузка не прошла";
  document.getElementById("nav").innerHTML="";
  document.getElementById("banner").innerHTML='Официальная модель не показана: viewer не прошёл проверку публикации.';
  document.getElementById("view").innerHTML=`<div class="card"><h1>Официальный viewer не загрузился</h1><p class="sub">Демо-данные не подставлены. Это защищает от просмотра не той модели.</p><h2>Причина</h2><pre>${esc(reason)}</pre><h2>Что проверить</h2><ul><li>В каталоге viewer есть <code>VIEWER_PUBLISH_REPORT.json</code> со статусом <code>published</code>.</li><li>Рядом лежит указанный в отчёте версионированный bundle.</li><li>Хэш bundle, версия пакета, commit пакета, ревизия модели и статус валидации совпадают с отчётом.</li></ul><p class="sub">Демо открывается только явно: <code>?demo=1</code> или <code>#demo</code>.</p></div>`;
}
(isExplicitDemoMode()?loadDemoBundle():loadOfficialBundle())
  .then(d=>{DATA=d;boot();})
  .catch(showOfficialLoadError);
