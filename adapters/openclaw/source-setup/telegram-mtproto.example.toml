[telegram]
# Store environment variable names here, not credential values.
api_id_env = "TELEGRAM_API_ID"
api_hash_env = "TELEGRAM_API_HASH"
folder_title = "Systematization"

[runtime]
timezone = "Europe/Istanbul"
backfill_days = 1
download_media = true
