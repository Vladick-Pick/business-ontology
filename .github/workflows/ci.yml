name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run unit tests
        run: python3 -m unittest discover -s tests -q

      - name: Run fixture evals
        run: python3 scripts/run_evals.py --fixture-only

      - name: Validate business-attraction-v2 example
        run: python3 scripts/links_validate.py examples/business-attraction-v2
