name: Validate ontology

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Validate scripts and ontology contract
        run: |
          python3 -m py_compile scripts/links_validate.py scripts/build_registry.py scripts/run_evals.py runtime/reference_runtime.py
          python3 -m unittest discover -s tests
          python3 scripts/links_validate.py examples/acquisition-ontology
          python3 scripts/links_validate.py .
          python3 scripts/links_validate.py . --staged
          python3 scripts/build_registry.py examples/acquisition-ontology --out /tmp/business-ontology-registry
          python3 scripts/run_evals.py --fixture-only
